<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px sans-serif; width: 240px; padding: 12px; margin: 0; }
    button { display: block; width: 100%; padding: 8px; margin: 6px 0; cursor: pointer; }
    label { display: flex; align-items: center; gap: 6px; margin: 8px 0; }
    .help {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      border: 1px solid #888; color: #888; font-size: 11px; cursor: help; flex: none;
    }
    #status { min-height: 16px; color: #555; margin-top: 6px; }
    #lang { width: 100%; padding: 4px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <select id="lang"></select>
  <button id="send" data-i18n="send">Send cookies to VRCVideoCacher</button>
  <button id="copy" data-i18n="copy">Copy cookies to clipboard</button>
  <label>
    <input type="checkbox" id="auto" /> <span data-i18n="auto">Share cookies automatically</span>
    <span class="help" data-i18n-title="help" title="">?</span>
  </label>
  <div id="status"></div>
  <script src="cookies.js"></script>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
